<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2d1208"/>
      <stop offset="100%" stop-color="#0c0504"/>
    </radialGradient>
    <radialGradient id="gold" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#f0c842"/>
      <stop offset="100%" stop-color="#a07020"/>
    </radialGradient>
  </defs>
  <circle cx="96" cy="96" r="96" fill="url(#bg)"/>

  <!-- Outer petals (8) -->
  <g fill="url(#gold)" opacity="0.85">
    <ellipse cx="96" cy="55" rx="9" ry="22" transform="rotate(0 96 96)"/>
    <ellipse cx="96" cy="55" rx="9" ry="22" transform="rotate(45 96 96)"/>
    <ellipse cx="96" cy="55" rx="9" ry="22" transform="rotate(90 96 96)"/>
    <ellipse cx="96" cy="55" rx="9" ry="22" transform="rotate(135 96 96)"/>
    <ellipse cx="96" cy="55" rx="9" ry="22" transform="rotate(180 96 96)"/>
    <ellipse cx="96" cy="55" rx="9" ry="22" transform="rotate(225 96 96)"/>
    <ellipse cx="96" cy="55" rx="9" ry="22" transform="rotate(270 96 96)"/>
    <ellipse cx="96" cy="55" rx="9" ry="22" transform="rotate(315 96 96)"/>
  </g>

  <!-- Inner petals (8) -->
  <g fill="url(#gold)" opacity="0.65">
    <ellipse cx="96" cy="66" rx="6" ry="14" transform="rotate(22.5 96 96)"/>
    <ellipse cx="96" cy="66" rx="6" ry="14" transform="rotate(67.5 96 96)"/>
    <ellipse cx="96" cy="66" rx="6" ry="14" transform="rotate(112.5 96 96)"/>
    <ellipse cx="96" cy="66" rx="6" ry="14" transform="rotate(157.5 96 96)"/>
    <ellipse cx="96" cy="66" rx="6" ry="14" transform="rotate(202.5 96 96)"/>
    <ellipse cx="96" cy="66" rx="6" ry="14" transform="rotate(247.5 96 96)"/>
    <ellipse cx="96" cy="66" rx="6" ry="14" transform="rotate(292.5 96 96)"/>
    <ellipse cx="96" cy="66" rx="6" ry="14" transform="rotate(337.5 96 96)"/>
  </g>

  <!-- Center -->
  <circle cx="96" cy="96" r="14" fill="#f0c842"/>
  <circle cx="96" cy="96" r="9" fill="#c8902a"/>
  <circle cx="96" cy="96" r="5" fill="#f0c842"/>
